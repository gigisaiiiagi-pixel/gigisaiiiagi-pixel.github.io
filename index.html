<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nowosty1</title>
    <script type="module">
        const firebaseConfig = {
            apiKey: "AIzaSyBGq2mQFVashCvLctzTrsUnquOb61BlwhY",
            authDomain: "nowosty1-54e97.firebaseapp.com",
            projectId: "nowosty1-54e97",
            storageBucket: "nowosty1-54e97.firebasestorage.app",
            messagingSenderId: "825177165235",
            appId: "1:825177165235:web:3453bd664f6583ca3b4fc6"
        };

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, query, orderBy, Timestamp, updateDoc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentUser = null;
        let isAdmin = false;
        let allPosts = [];
        let allUsers = [];
        let currentView = 'posts';

        const postsContainer = document.getElementById('postsContainer');
        const createPostBtn = document.getElementById('createPostBtn');
        const profileBtn = document.getElementById('profileBtn');
        const viewPostsBtn = document.getElementById('viewPostsBtn');
        const discussionsBtn = document.getElementById('discussionsBtn');
        const postModal = document.getElementById('postModal');
        const profileModal = document.getElementById('profileModal');
        const infoModal = document.getElementById('infoModal');
        const sidebarNick = document.getElementById('sidebarNick');
        const sidebarRole = document.getElementById('sidebarRole');

        async function getUserIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch(e) {
                return '0.0.0.0';
            }
        }

        function generateRandomNick() {
            const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
            let nick = '';
            for(let i = 0; i < 8; i++) {
                nick += chars[Math.floor(Math.random() * chars.length)];
            }
            return nick;
        }

        async function getOrCreateUser() {
            let stored = localStorage.getItem('nowosty1_user_nick');
            const ip = await getUserIP();
            
            if(stored) {
                currentUser = { nickname: stored };
                const userRef = doc(db, "users", stored);
                const userSnap = await getDoc(userRef);
                if(!userSnap.exists()) {
                    await setDoc(userRef, {
                        nickname: stored,
                        ip: ip,
                        firstSeen: Timestamp.now()
                    });
                } else if(userSnap.data().ip !== ip) {
                    await setDoc(userRef, { ip: ip }, { merge: true });
                }
            } else {
                let newNick = generateRandomNick();
                let nickExists = true;
                while(nickExists) {
                    const userRef = doc(db, "users", newNick);
                    const userSnap = await getDoc(userRef);
                    if(!userSnap.exists()) {
                        nickExists = false;
                    } else {
                        newNick = generateRandomNick();
                    }
                }
                currentUser = { nickname: newNick };
                localStorage.setItem('nowosty1_user_nick', newNick);
                await setDoc(doc(db, "users", newNick), {
                    nickname: newNick,
                    ip: ip,
                    firstSeen: Timestamp.now()
                });
            }
            sidebarNick.innerText = currentUser.nickname;
            if(currentUser.nickname === 'SWILL_ADMIN') {
                isAdmin = true;
                sidebarRole.innerText = '👑 АДМИН';
            } else {
                isAdmin = false;
                sidebarRole.innerText = 'Пользователь';
            }
        }

        function subscribeToUsers() {
            const q = query(collection(db, "users"), orderBy("firstSeen", "desc"));
            onSnapshot(q, (snapshot) => {
                const users = [];
                snapshot.forEach(doc => {
                    users.push({ id: doc.id, ...doc.data() });
                });
                allUsers = users;
            });
        }

        function showUserList() {
            if(allUsers.length === 0) {
                document.getElementById('userListContainer').innerHTML = '<div style="color:#888;">Пользователей пока нет</div>';
                infoModal.style.display = 'flex';
                return;
            }
            const container = document.getElementById('userListContainer');
            container.innerHTML = '';
            allUsers.forEach(user => {
                const userDiv = document.createElement('div');
                userDiv.className = 'user-item';
                const dateStr = user.firstSeen ? new Date(user.firstSeen.toDate()).toLocaleString() : 'неизвестно';
                userDiv.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <div>
                            <strong>@${escapeHtml(user.nickname)}</strong><br>
                            📍 IP: ${escapeHtml(user.ip)}<br>
                            📅 Зарегистрирован: ${dateStr}
                        </div>
                        ${isAdmin ? `<button class="delete-user" data-user-id="${user.nickname}" style="background:none; border:1px solid #f33; color:#f66; padding:5px 10px; cursor:pointer;">🗑 Удалить</button>` : ''}
                    </div>
                `;
                container.appendChild(userDiv);
            });
            
            document.querySelectorAll('.delete-user').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const userId = btn.getAttribute('data-user-id');
                    if(confirm(`Удалить пользователя @${userId}?`)) {
                        await deleteDoc(doc(db, "users", userId));
                    }
                });
            });
            infoModal.style.display = 'flex';
        }

        function escapeHtml(str) {
            if(!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if(m === '&') return '&amp;';
                if(m === '<') return '&lt;';
                if(m === '>') return '&gt;';
                return m;
            });
        }

        function formatDate(timestamp) {
            if(!timestamp) return 'только что';
            const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
            return date.toLocaleString();
        }

        function renderCommentsTree(comments, postId, level = 0) {
            if(!comments || comments.length === 0) return '<div style="color:#555; margin-left: 20px;">💬 Нет комментариев. Будьте первым!</div>';
            let html = '';
            comments.forEach(c => {
                const canDelete = isAdmin || c.author === currentUser.nickname;
                const marginLeft = level * 20;
                html += `
                    <div class="comment" style="margin-left: ${marginLeft}px;" data-comment-id="${c.id}">
                        <div class="comment-header">
                            <strong class="comment-author">@${escapeHtml(c.author)}</strong>
                            <span class="comment-date">${formatDate(c.date)}</span>
                            ${canDelete ? `<button class="delete-comment" data-post-id="${postId}" data-comment-id="${c.id}">🗑</button>` : ''}
                        </div>
                        <div class="comment-text">${escapeHtml(c.text)}</div>
                        <div class="comment-actions">
                            <button class="reply-to-comment" data-post-id="${postId}" data-comment-id="${c.id}" data-author="${escapeHtml(c.author)}">📎 Ответить</button>
                        </div>
                        ${c.replies && c.replies.length > 0 ? renderCommentsTree(c.replies, postId, level + 1) : ''}
                    </div>
                `;
            });
            return html;
        }

        async function addReplyToComment(postId, parentCommentId, replyText) {
            const postRef = doc(db, "posts", postId);
            const postSnap = await getDoc(postRef);
            if(postSnap.exists()) {
                const post = postSnap.data();
                const addReplyRecursive = (comments) => {
                    for(let c of comments) {
                        if(c.id === parentCommentId) {
                            if(!c.replies) c.replies = [];
                            c.replies.push({
                                id: Date.now().toString() + Math.random(),
                                text: replyText,
                                author: currentUser.nickname,
                                date: Date.now(),
                                replies: []
                            });
                            return true;
                        }
                        if(c.replies && addReplyRecursive(c.replies)) return true;
                    }
                    return false;
                };
                const newComments = JSON.parse(JSON.stringify(post.comments || []));
                addReplyRecursive(newComments);
                await updateDoc(postRef, { comments: newComments });
            }
        }

        async function deleteCommentById(postId, commentId) {
            const postRef = doc(db, "posts", postId);
            const postSnap = await getDoc(postRef);
            if(postSnap.exists()) {
                const post = postSnap.data();
                const removeCommentRecursive = (comments) => {
                    for(let i = 0; i < comments.length; i++) {
                        if(comments[i].id === commentId) {
                            comments.splice(i, 1);
                            return true;
                        }
                        if(comments[i].replies && removeCommentRecursive(comments[i].replies)) {
                            return true;
                        }
                    }
                    return false;
                };
                const newComments = JSON.parse(JSON.stringify(post.comments || []));
                removeCommentRecursive(newComments);
                await updateDoc(postRef, { comments: newComments });
            }
        }

        function renderAllDiscussions() {
            let allCommentsFlat = [];
            allPosts.forEach(post => {
                if(post.comments && post.comments.length > 0) {
                    const flatten = (comments, postId, parentId = null) => {
                        comments.forEach(c => {
                            allCommentsFlat.push({
                                id: c.id,
                                text: c.text,
                                author: c.author,
                                date: c.date,
                                postId: postId,
                                postTitle: post.title,
                                parentId: parentId
                            });
                            if(c.replies && c.replies.length > 0) {
                                flatten(c.replies, postId, c.id);
                            }
                        });
                    };
                    flatten(post.comments, post.id);
                }
            });
            allCommentsFlat.sort((a, b) => (b.date || 0) - (a.date || 0));

            if(allCommentsFlat.length === 0) {
                postsContainer.innerHTML = '<div style="text-align:center; padding:50px; color:#888;">💬 Нет комментариев. Напишите первый!</div>';
                return;
            }

            let html = '<div class="discussions-list">';
            allCommentsFlat.forEach(comment => {
                const canDelete = isAdmin || comment.author === currentUser.nickname;
                html += `
                    <div class="discussion-card" data-comment-id="${comment.id}">
                        <div class="discussion-header">
                            <div>
                                <strong class="comment-author">@${escapeHtml(comment.author)}</strong>
                                <span class="comment-date"> · ${formatDate(comment.date)}</span>
                            </div>
                            ${canDelete ? `<button class="delete-discussion-comment" data-post-id="${comment.postId}" data-comment-id="${comment.id}">🗑</button>` : ''}
                        </div>
                        <div class="discussion-text">${escapeHtml(comment.text)}</div>
                        <div class="discussion-meta">
                            📍 Пост: <a href="#" class="goto-post" data-post-id="${comment.postId}">${escapeHtml(comment.postTitle.substring(0, 50))}</a>
                        </div>
                        <div class="comment-actions">
                            <button class="reply-to-discussion" data-post-id="${comment.postId}" data-parent-comment-id="${comment.id}" data-author="${escapeHtml(comment.author)}">📎 Ответить</button>
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            postsContainer.innerHTML = html;

            document.querySelectorAll('.goto-post').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    const postId = btn.getAttribute('data-post-id');
                    currentView = 'posts';
                    renderPosts(allPosts);
                    setTimeout(() => {
                        const postElement = document.querySelector(`.post-card[data-id="${postId}"]`);
                        if(postElement) postElement.scrollIntoView({ behavior: 'smooth' });
                    }, 100);
                });
            });

            document.querySelectorAll('.delete-discussion-comment').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const postId = btn.getAttribute('data-post-id');
                    const commentId = btn.getAttribute('data-comment-id');
                    await deleteCommentById(postId, commentId);
                });
            });

            document.querySelectorAll('.reply-to-discussion').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const postId = btn.getAttribute('data-post-id');
                    const parentCommentId = btn.getAttribute('data-parent-comment-id');
                    const author = btn.getAttribute('data-author');
                    const replyText = prompt(`Ответ @${author}:`, '');
                    if(replyText && replyText.trim() && replyText.length <= 1000) {
                        addReplyToComment(postId, parentCommentId, replyText.trim());
                    } else if(replyText && replyText.length > 1000) {
                        alert('Ответ не может быть длиннее 1000 символов');
                    }
                });
            });
        }

        function renderPosts(posts) {
            if(!posts || posts.length === 0) {
                postsContainer.innerHTML = '<div style="text-align:center; padding:50px; color:#888;">📭 Нет постов. Создайте первый!</div>';
                return;
            }

            postsContainer.innerHTML = '';
            [...posts].reverse().forEach(post => {
                const postDiv = document.createElement('div');
                postDiv.className = 'post-card';
                postDiv.setAttribute('data-id', post.id);

                postDiv.innerHTML = `
                    <div class="post-header">
                        <div class="post-author">
                            <div class="avatar">👤</div>
                            <span class="author-name">@${escapeHtml(post.authorNick)}</span>
                            <span class="post-date">${formatDate(post.date)}</span>
                        </div>
                        ${(isAdmin || currentUser.nickname === post.authorNick) ? `<button class="delete-post" data-id="${post.id}">🗑 Удалить пост</button>` : ''}
                    </div>
                    <div class="post-title">${escapeHtml(post.title)}</div>
                    <div class="post-text">${escapeHtml(post.text).replace(/\n/g, '<br>')}</div>
                    <div class="comments-section" id="comments-${post.id}">
                        <div class="comments-list" id="comments-list-${post.id}">${renderCommentsTree(post.comments || [], post.id)}</div>
                        <div class="add-comment">
                            <input type="text" class="comment-input" id="comment-input-${post.id}" placeholder="Ваш комментарий (макс 1000 символов)" maxlength="1000">
                            <button class="comment-submit" data-id="${post.id}">💬 Отправить</button>
                        </div>
                    </div>
                `;
                postsContainer.appendChild(postDiv);
            });

            document.querySelectorAll('.delete-post').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const id = btn.getAttribute('data-id');
                    await deleteDoc(doc(db, "posts", id));
                });
            });

            document.querySelectorAll('.comment-submit').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const postId = btn.getAttribute('data-id');
                    const input = document.getElementById(`comment-input-${postId}`);
                    const text = input.value.trim();
                    if(text && text.length <= 1000 && text.length > 0) {
                        const postRef = doc(db, "posts", postId);
                        const postSnap = await getDoc(postRef);
                        if(postSnap.exists()) {
                            const post = postSnap.data();
                            const newComments = JSON.parse(JSON.stringify(post.comments || []));
                            newComments.push({
                                id: Date.now().toString() + Math.random(),
                                text: text,
                                author: currentUser.nickname,
                                date: Date.now(),
                                replies: []
                            });
                            await updateDoc(postRef, { comments: newComments });
                        }
                        input.value = '';
                    } else {
                        alert('Комментарий от 1 до 1000 символов');
                    }
                });
            });

            document.querySelectorAll('.delete-comment').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const postId = btn.getAttribute('data-post-id');
                    const commentId = btn.getAttribute('data-comment-id');
                    await deleteCommentById(postId, commentId);
                });
            });

            document.querySelectorAll('.reply-to-comment').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const postId = btn.getAttribute('data-post-id');
                    const commentId = btn.getAttribute('data-comment-id');
                    const author = btn.getAttribute('data-author');
                    const replyText = prompt(`Ответ @${author}:`, '');
                    if(replyText && replyText.trim() && replyText.length <= 1000) {
                        addReplyToComment(postId, commentId, replyText.trim());
                    } else if(replyText && replyText.length > 1000) {
                        alert('Ответ не может быть длиннее 1000 символов');
                    }
                });
            });
        }

        async function createPost(title, text) {
            if(title.length > 100) { alert('Название максимум 100 символов'); return false; }
            if(text.length > 10000) { alert('Текст максимум 10000 символов'); return false; }

            await addDoc(collection(db, "posts"), {
                title: title,
                text: text,
                authorNick: currentUser.nickname,
                date: Timestamp.now(),
                comments: []
            });
            return true;
        }

        function subscribeToPosts() {
            const q = query(collection(db, "posts"), orderBy("date", "desc"));
            onSnapshot(q, (snapshot) => {
                const posts = [];
                snapshot.forEach(doc => {
                    posts.push({ id: doc.id, ...doc.data() });
                });
                allPosts = posts;
                if(currentView === 'posts') {
                    renderPosts(allPosts);
                } else {
                    renderAllDiscussions();
                }
            });
        }

        function openProfileModal() {
            document.getElementById('nicknameInput').value = currentUser.nickname;
            document.getElementById('profileModal').style.display = 'flex';
        }

        function saveProfile() {
            let newNick = document.getElementById('nicknameInput').value.trim();
            if(newNick && !/^[a-zA-Z0-9\-]+$/.test(newNick)) {
                alert('Только английские буквы, цифры и дефис');
                return;
            }
            if(newNick && (newNick.length < 1 || newNick.length > 20)) {
                alert('Никнейм от 1 до 20 символов');
                return;
            }
            if(newNick && newNick !== currentUser.nickname) {
                // Проверяем уникальность
                const userRef = doc(db, "users", newNick);
                getDoc(userRef).then(async (snap) => {
                    if(snap.exists()) {
                        alert('Никнейм уже занят');
                    } else {
                        const oldNick = currentUser.nickname;
                        // Создаём нового пользователя
                        const ip = await getUserIP();
                        await setDoc(doc(db, "users", newNick), {
                            nickname: newNick,
                            ip: ip,
                            firstSeen: Timestamp.now()
                        });
                        // Удаляем старого
                        await deleteDoc(doc(db, "users", oldNick));
                        currentUser.nickname = newNick;
                        localStorage.setItem('nowosty1_user_nick', newNick);
                        sidebarNick.innerText = newNick;
                        if(newNick === 'SWILL_ADMIN') {
                            isAdmin = true;
                            sidebarRole.innerText = '👑 АДМИН';
                        } else {
                            isAdmin = false;
                            sidebarRole.innerText = 'Пользователь';
                        }
                        if(currentView === 'posts') {
                            renderPosts(allPosts);
                        } else {
                            renderAllDiscussions();
                        }
                        document.getElementById('profileModal').style.display = 'none';
                    }
                });
            } else {
                document.getElementById('profileModal').style.display = 'none';
            }
        }

        (async function init() {
            await getOrCreateUser();
            subscribeToUsers();
            subscribeToPosts();

            createPostBtn.onclick = () => postModal.style.display = 'flex';
            viewPostsBtn.onclick = () => {
                currentView = 'posts';
                renderPosts(allPosts);
            };
            discussionsBtn.onclick = () => {
                currentView = 'discussions';
                renderAllDiscussions();
            };
            profileBtn.onclick = openProfileModal;
            document.getElementById('saveProfile').onclick = saveProfile;
            document.getElementById('submitPost').onclick = async () => {
                const title = document.getElementById('postTitle').value;
                const text = document.getElementById('postText').value;
                await createPost(title, text);
                postModal.style.display = 'none';
                document.getElementById('postTitle').value = '';
                document.getElementById('postText').value = '';
            };
            document.getElementById('infoBtn').onclick = showUserList;

            document.querySelectorAll('.close, .close-profile, .close-info').forEach(btn => {
                btn.onclick = function() {
                    postModal.style.display = 'none';
                    profileModal.style.display = 'none';
                    infoModal.style.display = 'none';
                };
            });
            window.onclick = (e) => {
                if(e.target.classList.contains('modal')) {
                    e.target.style.display = 'none';
                }
            };
        })();
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #eee; font-family: 'Segoe UI', monospace; }
        .top-bar { background: #0a0a0a; border-bottom: 1px solid #222; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .left-area { display: flex; gap: 15px; align-items: center; }
        .admin-input { background: #111; border: 1px solid #333; color: #0f0; padding: 6px 10px; font-family: monospace; width: 180px; }
        .info-btn, .check-admin { background: #1a1a1a; border: 1px solid #333; color: #0f0; padding: 6px 12px; cursor: pointer; }
        .profile-btn { background: #111; border: 1px solid #444; color: #fff; padding: 8px 20px; border-radius: 30px; cursor: pointer; }
        .main-container { display: flex; max-width: 1400px; margin: 0 auto; padding: 20px; gap: 20px; }
        .posts-area { flex: 3; }
        .sidebar { flex: 1; position: sticky; top: 80px; height: fit-content; background: #0a0a0a; padding: 15px; border: 1px solid #222; }
        .action-buttons { display: flex; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; }
        .create-post-btn, .view-posts-btn, .discussions-btn { background: #0a0a0a; border: 1px solid #0f0; color: #0f0; padding: 12px 24px; cursor: pointer; font-family: monospace; }
        .post-card { background: #0c0c0c; border: 1px solid #222; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .post-header { display: flex; justify-content: space-between; border-bottom: 1px solid #222; padding-bottom: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .post-author { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: #1a1a1a; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .author-name { color: #0f0; font-weight: bold; }
        .post-date { color: #666; font-size: 12px; margin-left: 10px; }
        .post-title { font-size: 24px; font-weight: bold; margin: 15px 0; }
        .post-text { color: #ccc; line-height: 1.5; margin: 15px 0; white-space: pre-wrap; }
        .delete-post { background: none; border: 1px solid #f33; color: #f66; padding: 5px 12px; cursor: pointer; }
        .comments-section { margin-top: 20px; border-top: 1px solid #222; padding-top: 15px; }
        .comment { background: #111; padding: 10px; margin: 10px 0; border-radius: 8px; }
        .comment-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; flex-wrap: wrap; }
        .comment-author { color: #0f0; font-size: 14px; }
        .comment-date { color: #666; font-size: 11px; margin-left: 8px; }
        .comment-text { color: #ddd; margin: 5px 0; word-break: break-word; }
        .comment-actions { margin-top: 5px; }
        .reply-to-comment, .reply-to-discussion { background: none; border: 1px solid #555; color: #aaa; padding: 2px 8px; cursor: pointer; font-size: 12px; border-radius: 4px; }
        .delete-comment, .delete-discussion-comment { background: none; border: none; color: #f66; cursor: pointer; font-size: 14px; margin-left: 10px; }
        .add-comment { display: flex; gap: 10px; margin-top: 10px; }
        .comment-input { flex: 1; background: #1a1a1a; border: 1px solid #333; color: white; padding: 8px; border-radius: 6px; }
        .comment-submit { background: #0a0a0a; border: 1px solid #0f0; color: #0f0; padding: 6px 12px; cursor: pointer; border-radius: 6px; }
        .discussion-card { background: #0c0c0c; border: 1px solid #333; border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .discussion-header { display: flex; justify-content: space-between; margin-bottom: 8px; flex-wrap: wrap; }
        .discussion-text { margin: 8px 0; word-break: break-word; }
        .discussion-meta { font-size: 12px; color: #888; margin-top: 8px; }
