<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nowosty1</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; transition: background 0.2s, color 0.2s, border-color 0.2s; }
        
        body.light { background: #e4e6eb; color: #050505; }
        body.dark { background: #000; color: #eee; }
        
        body.light .top-bar, body.light .sidebar, body.light .post-card, body.light .discussion-card, 
        body.light .comment, body.light .modal-content, body.light .chat-modal-content, body.light .chat-list, body.light .chat-messages { background: #fff; border-color: #ddd; }
        body.dark .top-bar, body.dark .sidebar, body.dark .post-card, body.dark .discussion-card, 
        body.dark .comment, body.dark .modal-content, body.dark .chat-modal-content, body.dark .chat-list, body.dark .chat-messages { background: #0a0a0a; border-color: #222; }
        
        body.light .author-name { color: #0066cc; }
        body.dark .author-name { color: #0f0; }
        
        body.light .post-text, body.light .comment-text { color: #333; }
        body.dark .post-text, body.dark .comment-text { color: #ccc; }
        
        body.light .admin-input, body.light .comment-input, body.light .modal-content input, 
        body.light .modal-content textarea, body.light .search-input, body.light .chat-input { background: #fff; border-color: #ccc; color: #333; }
        body.dark .admin-input, body.dark .comment-input, body.dark .modal-content input, 
        body.dark .modal-content textarea, body.dark .search-input, body.dark .chat-input { background: #111; border-color: #333; color: #fff; }
        
        body.light .like-btn { color: #555; }
        body.dark .like-btn { color: #aaa; }
        body.light .like-btn.active { color: #e0245e; }
        body.dark .like-btn.active { color: #ff4466; }
        
        .top-bar { padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; flex-wrap: wrap; gap: 10px; border-bottom: 1px solid; }
        .left-area { display: flex; gap: 15px; align-items: center; flex-wrap: wrap; }
        .admin-input { padding: 6px 10px; font-family: monospace; width: 180px; border-radius: 6px; border: 1px solid; }
        .info-btn, .check-admin, .theme-btn { padding: 6px 12px; cursor: pointer; border-radius: 6px; border: 1px solid; }
        .profile-btn { padding: 8px 20px; border-radius: 30px; cursor: pointer; border: 1px solid; }
        .main-container { display: flex; max-width: 1400px; margin: 0 auto; padding: 20px; gap: 20px; }
        .posts-area { flex: 3; }
        .sidebar { flex: 1; position: sticky; top: 80px; height: fit-content; padding: 15px; border-radius: 12px; border: 1px solid; }
        .action-buttons { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .create-post-btn, .view-posts-btn, .discussions-btn, .chat-btn { padding: 10px 20px; cursor: pointer; font-family: monospace; border-radius: 8px; border: 1px solid #0f0; background: transparent; color: #0f0; }
        .search-input { padding: 10px; width: 100%; border-radius: 8px; margin-bottom: 20px; border: 1px solid; }
        .post-card { border-radius: 12px; padding: 20px; margin-bottom: 20px; border: 1px solid; }
        .post-header { display: flex; justify-content: space-between; padding-bottom: 10px; margin-bottom: 15px; flex-wrap: wrap; gap: 10px; border-bottom: 1px solid; }
        .post-author { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: #1a1a1a; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .author-name { font-weight: bold; }
        .post-date { font-size: 12px; opacity: 0.6; }
        .post-title { font-size: 22px; font-weight: bold; margin: 15px 0; }
        .post-text { line-height: 1.5; margin: 15px 0; white-space: pre-wrap; }
        .post-actions { display: flex; gap: 15px; margin: 10px 0; flex-wrap: wrap; }
        .like-btn { background: none; border: none; cursor: pointer; font-size: 16px; padding: 5px 10px; border-radius: 20px; display: flex; align-items: center; gap: 5px; }
        .like-count { font-size: 13px; cursor: pointer; }
        .edit-post-btn, .edit-comment-btn { background: none; border: none; cursor: pointer; font-size: 16px; padding: 5px; }
        .delete-post, .delete-comment { background: none; border: 1px solid #f33; color: #f66; padding: 5px 12px; cursor: pointer; border-radius: 6px; }
        .private-badge { background: #ff9900; color: #000; padding: 2px 8px; border-radius: 12px; font-size: 11px; margin-left: 10px; }
        .comments-section { margin-top: 20px; padding-top: 15px; border-top: 1px solid; }
        .comment { padding: 10px; margin: 10px 0; border-radius: 8px; border: 1px solid; }
        .comment-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; flex-wrap: wrap; gap: 8px; }
        .comment-author { font-weight: bold; font-size: 14px; }
        .comment-date { font-size: 11px; opacity: 0.6; }
        .comment-text { margin: 5px 0; word-break: break-word; }
        .comment-actions { display: flex; gap: 10px; margin-top: 8px; flex-wrap: wrap; }
        .add-comment { display: flex; gap: 10px; margin-top: 15px; }
        .comment-input { flex: 1; padding: 10px; border-radius: 6px; border: 1px solid; }
        .comment-submit { padding: 8px 16px; border-radius: 6px; border: 1px solid #0f0; background: transparent; color: #0f0; cursor: pointer; }
        .discussion-card { border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid; }
        .discussion-header { display: flex; justify-content: space-between; margin-bottom: 8px; flex-wrap: wrap; gap: 8px; }
        .discussion-text { margin: 8px 0; word-break: break-word; }
        .discussion-meta { font-size: 12px; opacity: 0.7; margin-top: 8px; }
        .discussion-meta a { text-decoration: none; }
        .user-item { padding: 12px; border-bottom: 1px solid; }
        .load-more-btn { padding: 12px; text-align: center; cursor: pointer; border-radius: 8px; margin-top: 20px; border: 1px solid; }
        .toast { position: fixed; bottom: 30px; right: 30px; background: #333; color: #fff; padding: 12px 20px; border-radius: 8px; z-index: 1000; animation: fadeInOut 3s; }
        @keyframes fadeInOut { 0% { opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { opacity: 0; } }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content, .chat-modal-content { padding: 30px; width: 90%; max-width: 600px; border-radius: 12px; border: 1px solid; }
        .likes-list { max-height: 300px; overflow-y: auto; }
        .likes-list div { padding: 8px; border-bottom: 1px solid; }
        .chat-modal-content { max-width: 800px; height: 80vh; display: flex; flex-direction: column; }
        .chat-header { padding-bottom: 10px; margin-bottom: 10px; border-bottom: 1px solid; display: flex; justify-content: space-between; }
        .chat-users-list { width: 250px; border-right: 1px solid; overflow-y: auto; padding-right: 10px; }
        .chat-user { padding: 10px; cursor: pointer; border-radius: 8px; margin-bottom: 5px; }
        .chat-user:hover, .chat-user.active { background: rgba(0,255,0,0.1); }
        .chat-messages-area { flex: 1; display: flex; flex-direction: column; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 10px; }
        .chat-message { padding: 8px 12px; margin: 5px 0; border-radius: 12px; max-width: 80%; }
        .chat-message.my { background: #0f0; color: #000; align-self: flex-end; margin-left: auto; }
        .chat-message.other { background: #333; align-self: flex-start; }
        .chat-input-area { display: flex; gap: 10px; padding-top: 10px; border-top: 1px solid; }
        .chat-input { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid; }
        .chat-send { padding: 10px 20px; border-radius: 8px; border: 1px solid #0f0; background: transparent; color: #0f0; cursor: pointer; }
        .add-chat-user { display: flex; gap: 10px; margin-bottom: 15px; }
        .flex-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        @media (max-width: 768px) { .main-container { flex-direction: column; } .chat-modal-content { flex-direction: column; } .chat-users-list { width: 100%; border-right: none; border-bottom: 1px solid; margin-bottom: 10px; } }
        .close { float: right; font-size: 28px; cursor: pointer; color: #f00; }
        .avatar-select { display: flex; gap: 10px; flex-wrap: wrap; margin: 10px 0; }
        .avatar-option { font-size: 32px; cursor: pointer; padding: 5px; border-radius: 50%; }
        .avatar-option.selected { border: 2px solid #0f0; }
    </style>
</head>

<script type="module">
    const firebaseConfig = {
        apiKey: "AIzaSyBGq2mQFVashCvLctzTrsUnquOb61BlwhY",
        authDomain: "nowosty1-54e97.firebaseapp.com",
        projectId: "nowosty1-54e97",
        storageBucket: "nowosty1-54e97.firebasestorage.app",
        messagingSenderId: "825177165235",
        appId: "1:825177165235:web:3453bd664f6583ca3b4fc6"
    };

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, query, orderBy, Timestamp, updateDoc, getDoc, setDoc, arrayUnion, arrayRemove, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let currentUser = null;
    let isAdmin = false;
    let allPosts = [];
    let allUsers = [];
    let currentView = 'posts';
    let postsPage = 0;
    const POSTS_PER_PAGE = 5;
    let searchQuery = '';
    let currentChatWith = null;
    let chatsListener = null;

    const postsContainer = document.getElementById('postsContainer');
    const createPostBtn = document.getElementById('createPostBtn');
    const profileBtn = document.getElementById('profileBtn');
    const viewPostsBtn = document.getElementById('viewPostsBtn');
    const discussionsBtn = document.getElementById('discussionsBtn');
    const postModal = document.getElementById('postModal');
    const profileModal = document.getElementById('profileModal');
    const infoModal = document.getElementById('infoModal');
    const chatModal = document.getElementById('chatModal');
    const sidebarNick = document.getElementById('sidebarNick');
    const sidebarRole = document.getElementById('sidebarRole');
    const sidebarAvatar = document.getElementById('sidebarAvatar');
    const infoBtn = document.getElementById('infoBtn');
    const themeBtn = document.getElementById('themeBtn');
    const searchInput = document.getElementById('searchInput');
    const loadMoreBtn = document.getElementById('loadMoreBtn');

    function showToast(msg) { const toast = document.createElement('div'); toast.className = 'toast'; toast.innerText = msg; document.body.appendChild(toast); setTimeout(() => toast.remove(), 3000); }

    async function getUserIP() { try { const res = await fetch('https://api.ipify.org?format=json'); const data = await res.json(); return data.ip; } catch(e) { return '0.0.0.0'; } }
    function generateRandomNick() { const chars = 'abcdefghijklmnopqrstuvwxyz0123456789'; let nick = ''; for(let i=0;i<8;i++) nick += chars[Math.floor(Math.random()*chars.length)]; return nick; }
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
    function formatDate(timestamp) { if(!timestamp) return 'только что'; const d = timestamp.toDate ? timestamp.toDate() : new Date(timestamp); return d.toLocaleString(); }

    const avatars = ['😀','😎','🥸','🤠','😺','🐶','🐱','🦊'];
    
    async function getOrCreateUser() {
        let stored = localStorage.getItem('nowosty1_user_nick');
        let storedAvatar = localStorage.getItem('nowosty1_user_avatar') || '😀';
        const ip = await getUserIP();
        if(stored) {
            currentUser = { nickname: stored, avatar: storedAvatar };
            const userRef = doc(db, "users", stored);
            const userSnap = await getDoc(userRef);
            if(!userSnap.exists()) await setDoc(userRef, { nickname: stored, avatar: storedAvatar, ip: ip, firstSeen: Timestamp.now(), postsCount: 0, commentsCount: 0 });
            else await setDoc(userRef, { ip: ip, avatar: storedAvatar }, { merge: true });
        } else {
            let newNick = generateRandomNick();
            let nickExists = true;
            while(nickExists) { const snap = await getDoc(doc(db, "users", newNick)); if(!snap.exists()) nickExists = false; else newNick = generateRandomNick(); }
            currentUser = { nickname: newNick, avatar: '😀' };
            localStorage.setItem('nowosty1_user_nick', newNick);
            localStorage.setItem('nowosty1_user_avatar', '😀');
            await setDoc(doc(db, "users", newNick), { nickname: newNick, avatar: '😀', ip: ip, firstSeen: Timestamp.now(), postsCount: 0, commentsCount: 0 });
        }
        sidebarNick.innerText = currentUser.nickname;
        sidebarAvatar.innerText = currentUser.avatar;
        if(currentUser.nickname === 'SWILL_ADMIN') { isAdmin = true; sidebarRole.innerText = '👑 АДМИН'; infoBtn.style.display = 'inline-block'; }
        else { isAdmin = false; sidebarRole.innerText = 'Пользователь'; infoBtn.style.display = 'none'; }
    }

    async function updateUserStats() { if(!currentUser) return; const postsCount = allPosts.filter(p => p.authorNick === currentUser.nickname).length; const commentsCount = allPosts.reduce((acc,p)=> acc + (p.comments?.filter(c=>c.author===currentUser.nickname).length || 0),0); await setDoc(doc(db, "users", currentUser.nickname), { postsCount, commentsCount }, { merge: true }); }

    function subscribeToUsers() { onSnapshot(query(collection(db, "users"), orderBy("firstSeen", "desc")), snap => { allUsers = []; snap.forEach(d => allUsers.push({ id: d.id, ...d.data() })); }); }

    function showUserList() { if(!isAdmin) return; const container = document.getElementById('userListContainer'); container.innerHTML = ''; allUsers.forEach(user => { const dateStr = user.firstSeen ? new Date(user.firstSeen.toDate()).toLocaleString() : 'неизвестно'; container.innerHTML += `<div class="user-item"><div><strong>@${escapeHtml(user.nickname)}</strong><br>📍 IP: ${escapeHtml(user.ip)}<br>📅 Зарегистрирован: ${dateStr}<br>📝 Постов: ${user.postsCount || 0}, Комментов: ${user.commentsCount || 0}</div>${isAdmin ? `<button class="delete-user-btn" data-user="${user.nickname}" style="margin-top:8px; background:none; border:1px solid #f33; color:#f66; padding:5px; cursor:pointer;">🗑 Удалить пользователя</button>` : ''}</div>`; }); document.querySelectorAll('.delete-user-btn').forEach(btn => btn.addEventListener('click', async e => { const userId = btn.getAttribute('data-user'); if(confirm(`Удалить @${userId}? Все его посты и комментарии останутся.`)) await deleteDoc(doc(db, "users", userId)); })); infoModal.style.display = 'flex'; }

    async function toggleLike(type, id, postId) { if(!currentUser) return; const ref = doc(db, "posts", postId); const snap = await getDoc(ref); if(!snap.exists()) return; const data = snap.data(); const likes = data.likes || {}; const userLiked = likes[currentUser.nickname] === true; if(userLiked) { delete likes[currentUser.nickname]; await updateDoc(ref, { likes }); } else { likes[currentUser.nickname] = true; await updateDoc(ref, { likes }); } }

    async function editPost(postId, newTitle, newText) { await updateDoc(doc(db, "posts", postId), { title: newTitle, text: newText }); }
    async function editComment(postId, commentId, newText) { const postRef = doc(db, "posts", postId); const snap = await getDoc(postRef); if(snap.exists()) { const post = snap.data(); const editRecursive = (comments) => { for(let c of comments) { if(c.id === commentId) { c.text = newText; return true; } if(c.replies && editRecursive(c.replies)) return true; } return false; }; const newComments = JSON.parse(JSON.stringify(post.comments || [])); editRecursive(newComments); await updateDoc(postRef, { comments: newComments }); } }

    async function addCommentToPost(postId, text, parentId=null) { const postRef = doc(db, "posts", postId); const snap = await getDoc(postRef); if(snap.exists()) { const post = snap.data(); const newComment = { id: Date.now()+Math.random(), text, author: currentUser.nickname, date: Date.now(), replies: [], likes: {} }; let newComments = JSON.parse(JSON.stringify(post.comments || [])); if(parentId) { const addReply = (comments) => { for(let c of comments) { if(c.id === parentId) { if(!c.replies) c.replies = []; c.replies.push(newComment); return true; } if(c.replies && addReply(c.replies)) return true; } return false; }; addReply(newComments); } else newComments.push(newComment); await updateDoc(postRef, { comments: newComments }); updateUserStats(); if(parentId && post.authorNick !== currentUser.nickname) showToast(`@${post.authorNick}, вам ответили на комментарий`); } }

    async function deleteCommentById(postId, commentId) { const postRef = doc(db, "posts", postId); const snap = await getDoc(postRef); if(snap.exists()) { const post = snap.data(); const removeRecursive = (comments) => { for(let i=0;i<comments.length;i++) { if(comments[i].id === commentId) { comments.splice(i,1); return true; } if(comments[i].replies && removeRecursive(comments[i].replies)) return true; } return false; }; const newComments = JSON.parse(JSON.stringify(post.comments || [])); removeRecursive(newComments); await updateDoc(postRef, { comments: newComments }); updateUserStats(); } }

    function renderCommentsTree(comments, postId, level=0) { if(!comments?.length) return ''; let html=''; comments.forEach(c => { const canDelete = isAdmin || c.author === currentUser.nickname; const canEdit = c.author === currentUser.nickname; const likesCount = Object.keys(c.likes || {}).length; const userLiked = c.likes && c.likes[currentUser.nickname]; html += `<div class="comment" style="margin-left:${level*20}px"><div class="comment-header"><strong class="comment-author">@${escapeHtml(c.author)}</strong><span class="comment-date">${formatDate(c.date)}</span><div>${canEdit ? `<button class="edit-comment-btn" data-post-id="${postId}" data-comment-id="${c.id}" data-text="${escapeHtml(c.text)}">✏️</button>` : ''}${canDelete ? `<button class="delete-comment" data-post-id="${postId}" data-comment-id="${c.id}">🗑</button>` : ''}</div></div><div class="comment-text">${escapeHtml(c.text)}</div><div class="comment-actions"><button class="like-btn comment-like ${userLiked?'active':''}" data-type="comment" data-id="${c.id}" data-post="${postId}">❤️ <span class="like-count">${likesCount}</span></button><button class="reply-to-comment" data-post-id="${postId}" data-comment-id="${c.id}" data-author="${escapeHtml(c.author)}">📎 Ответить</button></div>${c.replies?.length ? renderCommentsTree(c.replies, postId, level+1) : ''}</div>`; }); return html; }

    function renderPosts(posts, append=false) { if(!append) postsContainer.innerHTML = ''; const filtered = posts.filter(p => (!p.private || isAdmin || p.authorNick === currentUser.nickname) && (p.title.toLowerCase().includes(searchQuery) || p.text.toLowerCase().includes(searchQuery))); const toShow = filtered.slice(0, (postsPage+1)*POSTS_PER_PAGE); if(toShow.length === 0 && !append) { postsContainer.innerHTML = '<div style="text-align:center; padding:50px;">📭 Нет постов</div>'; loadMoreBtn.style.display = 'none'; return; }
        toShow.forEach(post => { const canDelete = isAdmin || post.authorNick === currentUser.nickname; const canEdit = post.authorNick === currentUser.nickname; const likesCount = Object.keys(post.likes || {}).length; const userLiked = post.likes && post.likes[currentUser.nickname]; const postDiv = document.createElement('div'); postDiv.className = 'post-card'; postDiv.innerHTML = `<div class="post-header"><div class="post-author"><div class="avatar">${avatars.find(a=>a===post.authorAvatar) || '😀'}</div><span class="author-name">@${escapeHtml(post.authorNick)}</span><span class="post-date">${formatDate(post.date)}</span>${post.private ? '<span class="private-badge">🔒 Только для админа</span>' : ''}</div><div>${canEdit ? `<button class="edit-post-btn" data-id="${post.id}" data-title="${escapeHtml(post.title)}" data-text="${escapeHtml(post.text)}">✏️</button>` : ''}${canDelete ? `<button class="delete-post" data-id="${post.id}">🗑 Удалить пост</button>` : ''}</div></div><div class="post-title">${escapeHtml(post.title)}</div><div class="post-text">${escapeHtml(post.text).replace(/\n/g,'<br>')}</div><div class="post-actions"><button class="like-btn post-like ${userLiked?'active':''}" data-type="post" data-id="${post.id}">❤️ <span class="like-count">${likesCount}</span></button></div><div class="comments-section"><div class="comments-list">${renderCommentsTree(post.comments || [], post.id)}</div><div class="add-comment"><input type="text" class="comment-input" id="comment-input-${post.id}" placeholder="Ваш комментарий" maxlength="1000"><button class="comment-submit" data-id="${post.id}">💬 Отправить</button></div></div>`; postsContainer.appendChild(postDiv); });
        document.querySelectorAll('.delete-post').forEach(btn => btn.addEventListener('click', async e => { const id = btn.getAttribute('data-id'); await deleteDoc(doc(db, "posts", id)); updateUserStats(); }));
        document.querySelectorAll('.edit-post-btn').forEach(btn => btn.addEventListener('click', e => { document.getElementById('editPostId').value = btn.getAttribute('data-id'); document.getElementById('editPostTitle').value = btn.getAttribute('data-title'); document.getElementById('editPostText').value = btn.getAttribute('data-text'); document.getElementById('editPostModal').style.display = 'flex'; }));
        document.querySelectorAll('.delete-comment').forEach(btn => btn.addEventListener('click', async e => { await deleteCommentById(btn.getAttribute('data-post-id'), btn.getAttribute('data-comment-id')); }));
        document.querySelectorAll('.edit-comment-btn').forEach(btn => btn.addEventListener('click', e => { document.getElementById('editCommentPostId').value = btn.getAttribute('data-post-id'); document.getElementById('editCommentId').value = btn.getAttribute('data-comment-id'); document.getElementById('editCommentText').value = btn.getAttribute('data-text'); document.getElementById('editCommentModal').style.display = 'flex'; }));
        document.querySelectorAll('.comment-submit').forEach(btn => btn.addEventListener('click', async e => { const postId = btn.getAttribute('data-id'); const input = document.getElementById(`comment-input-${postId}`); const text = input.value.trim(); if(text) { await addCommentToPost(postId, text); input.value = ''; } else alert('Введите текст'); }));
        document.querySelectorAll('.reply-to-comment').forEach(btn => btn.addEventListener('click', e => { const reply = prompt(`Ответ @${btn.getAttribute('data-author')}:`); if(reply?.trim()) addCommentToPost(btn.getAttribute('data-post-id'), reply.trim(), btn.getAttribute('data-comment-id')); }));
        document.querySelectorAll('.like-btn').forEach(btn => btn.addEventListener('click', async e => { const type = btn.getAttribute('data-type'); const id = btn.getAttribute('data-id'); const postId = type === 'post' ? id : btn.getAttribute('data-post'); await toggleLike(type, id, postId); }));
        document.querySelectorAll('.like-count').forEach(btn => { const parent = btn.closest('.like-btn'); if(parent) btn.addEventListener('click', async e => { e.stopPropagation(); const postId = parent.getAttribute('data-type') === 'post' ? parent.getAttribute('data-id') : parent.getAttribute('data-post'); const snap = await getDoc(doc(db, "posts", postId)); if(snap.exists()) { const likes = snap.data().likes || {}; const users = Object.keys(likes); const container = document.getElementById('likesList'); container.innerHTML = users.length ? users.map(u => `<div>@${escapeHtml(u)}</div>`).join('') : '<div>Никого</div>'; document.getElementById('likesModal').style.display = 'flex'; } }); });
        loadMoreBtn.style.display = (toShow.length < filtered.length) ? 'block' : 'none';
    }

    function renderAllDiscussions() { let flat = []; allPosts.forEach(post => { if(post.comments) { const flatten = (c, pid) => { c.forEach(cm => { flat.push({ ...cm, postId: pid, postTitle: post.title }); if(cm.replies) flatten(cm.replies, pid); }); }; flatten(post.comments, post.id); } }); flat.sort((a,b)=>(b.date||0)-(a.date||0)); let html = `<div class="discussions-header"><h3>💬 Обсуждения</h3><div class="new-discussion-comment"><input type="text" id="newDiscussionInput" placeholder="Новый комментарий (к последнему посту)" maxlength="1000"><button id="submitNewDiscussion">✏️ Опубликовать</button></div></div>`; if(!flat.length) html += '<div style="text-align:center;padding:50px;">💬 Нет комментариев</div>'; else flat.forEach(c => { const canDelete = isAdmin || c.author === currentUser.nickname; html += `<div class="discussion-card"><div class="discussion-header"><div><strong>@${escapeHtml(c.author)}</strong><span style="font-size:12px;"> · ${formatDate(c.date)}</span></div>${canDelete ? `<button class="del-disc-comment" data-post="${c.postId}" data-comment="${c.id}">🗑</button>` : ''}</div><div class="discussion-text">${escapeHtml(c.text)}</div><div class="discussion-meta">📍 Пост: <a href="#" class="goto-post" data-post="${c.postId}">${escapeHtml(c.postTitle?.substring(0,50))}</a></div><div class="comment-actions"><button class="reply-disc" data-post="${c.postId}" data-comment="${c.id}" data-author="${escapeHtml(c.author)}">📎 Ответить</button></div></div>`; }); postsContainer.innerHTML = html; document.querySelectorAll('.del-disc-comment').forEach(btn => btn.addEventListener('click', async e => { await deleteCommentById(btn.getAttribute('data-post'), btn.getAttribute('data-comment')); })); document.querySelectorAll('.goto-post').forEach(btn => btn.addEventListener('click', e => { e.preventDefault(); currentView='posts'; renderPosts(allPosts); setTimeout(()=>document.querySelector(`.post-card[data-id="${btn.getAttribute('data-post')}"]`)?.scrollIntoView({behavior:'smooth'}),100); })); document.querySelectorAll('.reply-disc').forEach(btn => btn.addEventListener('click', e => { const txt = prompt(`Ответ @${btn.getAttribute('data-author')}:`); if(txt?.trim()) addCommentToPost(btn.getAttribute('data-post'), txt.trim(), btn.getAttribute('data-comment')); })); document.getElementById('submitNewDiscussion')?.addEventListener('click', async () => { const inp = document.getElementById('newDiscussionInput'); if(inp.value.trim() && allPosts.length) { await addCommentToPost(allPosts[0].id, inp.value.trim()); inp.value = ''; } else alert('Нет постов или пустой комментарий'); }); }

    async function createPost(title, text, isPrivate) { if(title.length>100||text.length>10000) return alert('Лимиты'); await addDoc(collection(db,"posts"), { title, text, authorNick: currentUser.nickname, authorAvatar: currentUser.avatar, date: Timestamp.now(), comments: [], likes: {}, private: isPrivate }); updateUserStats(); }

    function subscribeToPosts() { onSnapshot(query(collection(db,"posts"), orderBy("date","desc")), snap => { allPosts = []; snap.forEach(d => allPosts.push({ id: d.id, ...d.data() })); if(currentView === 'posts') renderPosts(allPosts); else if(currentView === 'discussions') renderAllDiscussions(); }); }

    async function sendMessage(to, text) { if(!text.trim()) return; const chatId = [currentUser.nickname, to].sort().join('_'); await setDoc(doc(db, "chats", chatId), { participants: [currentUser.nickname, to], lastMessage: text, lastUpdate: Timestamp.now() }, { merge: true }); await addDoc(collection(db, "chats", chatId, "messages"), { from: currentUser.nickname, text: text, timestamp: Timestamp.now() }); }

    async function loadChats() { const chatsList = document.getElementById('chatUsersList'); const q = query(collection(db, "chats"), where("participants", "array-contains", currentUser.nickname)); onSnapshot(q, snap => { const chats = []; snap.forEach(d => { const data = d.data(); const other = data.participants.find(p => p !== currentUser.nickname); chats.push({ id: d.id, other, lastMessage: data.lastMessage }); }); chatsList.innerHTML = chats.map(c => `<div class="chat-user" data-user="${c.other}"><strong>@${escapeHtml(c.other)}</strong><div style="font-size:12px;">${escapeHtml(c.lastMessage?.substring(0,30)) || ''}</div></div>`).join(''); document.querySelectorAll('.chat-user').forEach(el => el.addEventListener('click', () => { currentChatWith = el.getAttribute('data-user'); loadMessages(currentChatWith); document.querySelectorAll('.chat-user').forEach(u => u.classList.remove('active')); el.classList.add('active'); })); }); }

    async function loadMessages(withUser) { const messagesDiv = document.getElementById('chatMessages'); const chatId = [currentUser.nickname, withUser].sort().join('_'); if(chatsListener) chatsListener(); chatsListener = onSnapshot(query(collection(db, "chats", chatId, "messages"), orderBy("timestamp")), snap => { messagesDiv.innerHTML = ''; snap.forEach(d => { const msg = d.data(); const isMy = msg.from === currentUser.nickname; messagesDiv.innerHTML += `<div class="chat-message ${isMy ? 'my' : 'other'}"><strong>${isMy ? 'Я' : '@'+escapeHtml(msg.from)}</strong><br>${escapeHtml(msg.text)}<div style="font-size:10px; opacity:0.6;">${formatDate(msg.timestamp)}</div></div>`; }); messagesDiv.scrollTop = messagesDiv.scrollHeight; }); }

    document.getElementById('saveEditPost').onclick = async () => { await editPost(document.getElementById('editPostId').value, document.getElementById('editPostTitle').value, document.getElementById('editPostText').value); document.getElementById('editPostModal').style.display = 'none'; };
    document.getElementById('saveEditComment').onclick = async () => { await editComment(document.getElementById('editCommentPostId').value, document.getElementById('editCommentId').value, document.getElementById('editCommentText').value); document.getElementById('editCommentModal').style.display = 'none'; };
    document.getElementById('addChatUserBtn').onclick = () => { const nick = document.getElementById('addChatUserInput').value.trim(); if(nick && nick !== currentUser.nickname) { currentChatWith = nick; loadMessages(nick); document.getElementById('openChatBtn').click(); } else alert('Введите корректный ник'); };
    document.getElementById('sendChatBtn').onclick = () => { if(currentChatWith) sendMessage(currentChatWith, document.getElementById('chatMessageInput').value); document.getElementById('chatMessageInput').value = ''; };
    document.getElementById('openChatBtn').onclick = () => { loadChats(); chatModal.style.display = 'flex'; };
    document.getElementById('saveProfile').onclick = async () => { let newNick = document.getElementById('nicknameInput').value.trim(); const selectedAvatar = document.querySelector('.avatar-option.selected')?.innerText || currentUser.avatar; if(newNick && newNick !== currentUser.nickname) { if(!/^[a-zA-Z0-9\-]+$/.test(newNick) || newNick.length<1 || newNick.length>20) return alert('Некорректный ник'); const snap = await getDoc(doc(db, "users", newNick)); if(snap.exists()) return alert('Ник занят'); await deleteDoc(doc(db, "users", currentUser.nickname)); currentUser.nickname = newNick; localStorage.setItem('nowosty1_user_nick', newNick); } currentUser.avatar = selectedAvatar; localStorage.setItem('nowosty1_user_avatar', selectedAvatar); await setDoc(doc(db, "users", currentUser.nickname), { nickname: currentUser.nickname, avatar: currentUser.avatar, ip: await getUserIP(), firstSeen: Timestamp.now() }, { merge: true }); sidebarNick.innerText = currentUser.nickname; sidebarAvatar.innerText = currentUser.avatar; if(currentUser.nickname === 'SWILL_ADMIN') { isAdmin=true; infoBtn.style.display='inline-block'; } profileModal.style.display='none'; location.reload(); };
    document.getElementById('submitPost').onclick = async () => { await createPost(document.getElementById('postTitle').value, document.getElementById('postText').value, document.getElementById('postPrivate').checked); postModal.style.display='none'; document.getElementById('postTitle').value=''; document.getElementById('postText').value=''; };
    document.getElementById('themeBtn').onclick = () => { const isDark = document.body.classList.contains('dark'); document.body.classList.remove(isDark ? 'dark' : 'light'); document.body.classList.add(isDark ? 'light' : 'dark'); themeBtn.innerText = isDark ? '🌞' : '🌙'; };
    searchInput.oninput = (e) => { searchQuery = e.target.value.toLowerCase(); postsPage=0; renderPosts(allPosts); };
    loadMoreBtn.onclick = () => { postsPage++; renderPosts(allPosts, true); };
    viewPostsBtn.onclick = () => { currentView='posts'; postsPage=0; renderPosts(allPosts); };
    discussionsBtn.onclick = () => { currentView='discussions'; renderAllDiscussions(); };
    createPostBtn.onclick = () => postModal.style.display='flex';
    profileBtn.onclick = () => { document.getElementById('nicknameInput').value = currentUser.nickname; const avatarSelect = document.getElementById('avatarSelect'); avatarSelect.innerHTML = avatars.map(a => `<div class="avatar-option ${a===currentUser.avatar?'selected':''}" data-avatar="${a}">${a}</div>`).join(''); document.querySelectorAll('.avatar-option').forEach(el => el.addEventListener('click', () => { document.querySelectorAll('.avatar-option').forEach(x=>x.classList.remove('selected')); el.classList.add('selected'); })); profileModal.style.display='flex'; };
    if(infoBtn) infoBtn.onclick = showUserList;
    document.querySelectorAll('.close, .close-profile, .close-info, #closePostModal, #closeEditPostModal, #closeEditCommentModal, #closeProfileModal, #closeInfoModal, #closeLikesModal, #closeChatModal').forEach(btn => { if(btn) btn.onclick = () => { postModal.style.display='none'; profileModal.style.display='none'; infoModal.style.display='none'; document.getElementById('editPostModal').style.display='none'; document.getElementById('editCommentModal').style.display='none'; document.getElementById('likesModal').style.display='none'; chatModal.style.display='none'; }; });
    window.onclick = e => { if(e.target.classList.contains('modal')) e.target.style.display='none'; };

    await getOrCreateUser(); subscribeToUsers(); subscribeToPosts();
</script>
