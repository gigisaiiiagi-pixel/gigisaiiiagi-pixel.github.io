<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nowosty1</title>
    <script type="module">
        const firebaseConfig = {
            apiKey: "AIzaSyBGq2mQFVashCvLctzTrsUnquOb61BlwhY",
            authDomain: "nowosty1-54e97.firebaseapp.com",
            projectId: "nowosty1-54e97",
            storageBucket: "nowosty1-54e97.firebasestorage.app",
            messagingSenderId: "825177165235",
            appId: "1:825177165235:web:3453bd664f6583ca3b4fc6"
        };

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, query, orderBy, Timestamp, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentUser = null;
        let isAdmin = false;
        let allPosts = [];

        const postsContainer = document.getElementById('postsContainer');
        const createPostBtn = document.getElementById('createPostBtn');
        const profileBtn = document.getElementById('profileBtn');
        const viewPostsBtn = document.getElementById('viewPostsBtn');
        const postModal = document.getElementById('postModal');
        const profileModal = document.getElementById('profileModal');
        const infoModal = document.getElementById('infoModal');
        const sidebarNick = document.getElementById('sidebarNick');
        const sidebarRole = document.getElementById('sidebarRole');

        function generateRandomNick() {
            const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
            let nick = '';
            for(let i = 0; i < 8; i++) {
                nick += chars[Math.floor(Math.random() * chars.length)];
            }
            return nick;
        }

        async function getOrCreateUser() {
            let stored = localStorage.getItem('nowosty1_user_nick');
            if(stored) {
                currentUser = { nickname: stored };
            } else {
                let newNick = generateRandomNick();
                currentUser = { nickname: newNick };
                localStorage.setItem('nowosty1_user_nick', newNick);
            }
            sidebarNick.innerText = currentUser.nickname;
            if(currentUser.nickname === 'SWILL_ADMIN') {
                isAdmin = true;
                sidebarRole.innerText = '👑 АДМИН';
            } else {
                sidebarRole.innerText = 'Пользователь';
            }
        }

        function renderPosts(posts) {
            if(!posts || posts.length === 0) {
                postsContainer.innerHTML = '<div style="text-align:center; padding:50px; color:#888;">📭 Нет постов. Создайте первый!</div>';
                return;
            }

            postsContainer.innerHTML = '';
            [...posts].reverse().forEach(post => {
                const postDiv = document.createElement('div');
                postDiv.className = 'post-card';
                postDiv.setAttribute('data-id', post.id);

                postDiv.innerHTML = `
                    <div class="post-header">
                        <div class="post-author">
                            <div class="avatar">${post.authorAvatar || '👤'}</div>
                            <span class="author-name">@${escapeHtml(post.authorNick)}</span>
                        </div>
                        ${(isAdmin || currentUser.nickname === post.authorNick) ? `<button class="delete-post" data-id="${post.id}">🗑 Удалить</button>` : ''}
                    </div>
                    <div class="post-title">${escapeHtml(post.title)}</div>
                    <div class="post-text">${escapeHtml(post.text).replace(/\n/g, '<br>')}</div>
                    <div class="comments-section" id="comments-${post.id}">
                        <div class="comments-list" id="comments-list-${post.id}">${renderCommentsList(post.comments || [])}</div>
                        <div class="add-comment">
                            <input type="text" class="comment-input" id="comment-input-${post.id}" placeholder="Ваш комментарий (макс 1000 символов)" maxlength="1000">
                            <button class="comment-submit" data-id="${post.id}">💬 Отправить</button>
                        </div>
                    </div>
                `;
                postsContainer.appendChild(postDiv);
            });

            document.querySelectorAll('.delete-post').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const id = btn.getAttribute('data-id');
                    await deleteDoc(doc(db, "posts", id));
                });
            });

            document.querySelectorAll('.comment-submit').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const postId = btn.getAttribute('data-id');
                    const input = document.getElementById(`comment-input-${postId}`);
                    const text = input.value.trim();
                    if(text && text.length <= 1000 && text.length > 0) {
                        const postRef = doc(db, "posts", postId);
                        await updateDoc(postRef, {
                            comments: arrayUnion({
                                author: currentUser.nickname,
                                text: text,
                                date: Date.now()
                            })
                        });
                        input.value = '';
                    } else {
                        alert('Комментарий от 1 до 1000 символов');
                    }
                });
            });
        }

        function renderCommentsList(comments) {
            if(!comments || comments.length === 0) return '<div style="color:#555;">💬 Нет комментариев. Будьте первым!</div>';
            let html = '<div style="margin-bottom:10px;"><strong>Комментарии:</strong></div>';
            comments.forEach(c => {
                html += `
                    <div class="comment">
                        <div class="comment-author">@${escapeHtml(c.author)}</div>
                        <div class="comment-text">${escapeHtml(c.text)}</div>
                    </div>
                `;
            });
            return html;
        }

        function escapeHtml(str) {
            if(!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if(m === '&') return '&amp;';
                if(m === '<') return '&lt;';
                if(m === '>') return '&gt;';
                return m;
            });
        }

        async function createPost(title, text) {
            if(title.length > 100) { alert('Название максимум 100 символов'); return false; }
            if(text.length > 10000) { alert('Текст максимум 10000 символов'); return false; }

            await addDoc(collection(db, "posts"), {
                title: title,
                text: text,
                authorNick: currentUser.nickname,
                authorAvatar: '👤',
                date: Timestamp.now(),
                comments: []
            });
            return true;
        }

        function subscribeToPosts() {
            const q = query(collection(db, "posts"), orderBy("date", "desc"));
            onSnapshot(q, (snapshot) => {
                const posts = [];
                snapshot.forEach(doc => {
                    posts.push({ id: doc.id, ...doc.data() });
                });
                allPosts = posts;
                renderPosts(allPosts);
            });
        }

        function openProfileModal() {
            document.getElementById('nicknameInput').value = currentUser.nickname;
            document.getElementById('profileModal').style.display = 'flex';
        }

        function saveProfile() {
            let newNick = document.getElementById('nicknameInput').value.trim();
            if(newNick && !/^[a-zA-Z0-9\-]+$/.test(newNick)) {
                alert('Только английские буквы, цифры и дефис');
                return;
            }
            if(newNick && (newNick.length < 1 || newNick.length > 20)) {
                alert('Никнейм от 1 до 20 символов');
                return;
            }
            if(newNick) {
                currentUser.nickname = newNick;
                localStorage.setItem('nowosty1_user_nick', newNick);
                sidebarNick.innerText = newNick;
                if(newNick === 'SWILL_ADMIN') {
                    isAdmin = true;
                    sidebarRole.innerText = '👑 АДМИН';
                } else {
                    isAdmin = false;
                    sidebarRole.innerText = 'Пользователь';
                }
                renderPosts(allPosts);
            }
            document.getElementById('profileModal').style.display = 'none';
        }

        function showUserList() {
            const usersMap = new Map();
            allPosts.forEach(post => {
                if(!usersMap.has(post.authorNick)) {
                    usersMap.set(post.authorNick, {
                        nickname: post.authorNick,
                        avatar: post.authorAvatar || '👤',
                        firstPostTitle: post.title
                    });
                }
            });
            const container = document.getElementById('userListContainer');
            container.innerHTML = '';
            usersMap.forEach(user => {
                const userDiv = document.createElement('div');
                userDiv.className = 'user-item';
                userDiv.innerHTML = `
                    <strong>@${escapeHtml(user.nickname)}</strong><br>
                    📝 Первый пост: ${escapeHtml(user.firstPostTitle.substring(0, 50))}
                `;
                container.appendChild(userDiv);
            });
            infoModal.style.display = 'flex';
        }

        (async function init() {
            await getOrCreateUser();
            subscribeToPosts();

            createPostBtn.onclick = () => postModal.style.display = 'flex';
            viewPostsBtn.onclick = () => postsContainer.scrollIntoView({ behavior: 'smooth' });
            profileBtn.onclick = openProfileModal;
            document.getElementById('saveProfile').onclick = saveProfile;
            document.getElementById('submitPost').onclick = async () => {
                const title = document.getElementById('postTitle').value;
                const text = document.getElementById('postText').value;
                await createPost(title, text);
                postModal.style.display = 'none';
                document.getElementById('postTitle').value = '';
                document.getElementById('postText').value = '';
            };
            document.getElementById('infoBtn').onclick = showUserList;

            document.querySelectorAll('.close, .close-profile, .close-info').forEach(btn => {
                btn.onclick = function() {
                    postModal.style.display = 'none';
                    profileModal.style.display = 'none';
                    infoModal.style.display = 'none';
                };
            });
            window.onclick = (e) => {
                if(e.target.classList.contains('modal')) {
                    e.target.style.display = 'none';
                }
            };
        })();
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #eee; font-family: 'Segoe UI', monospace; }
        .top-bar { background: #0a0a0a; border-bottom: 1px solid #222; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .left-area { display: flex; gap: 15px; align-items: center; }
        .admin-input { background: #111; border: 1px solid #333; color: #0f0; padding: 6px 10px; font-family: monospace; width: 180px; }
        .info-btn, .check-admin { background: #1a1a1a; border: 1px solid #333; color: #0f0; padding: 6px 12px; cursor: pointer; }
        .profile-btn { background: #111; border: 1px solid #444; color: #fff; padding: 8px 20px; border-radius: 30px; cursor: pointer; }
        .main-container { display: flex; max-width: 1400px; margin: 0 auto; padding: 20px; gap: 20px; }
        .posts-area { flex: 3; }
        .sidebar { flex: 1; position: sticky; top: 80px; height: fit-content; background: #0a0a0a; padding: 15px; border: 1px solid #222; }
        .action-buttons { display: flex; gap: 15px; margin-bottom: 30px; }
        .create-post-btn, .view-posts-btn { background: #0a0a0a; border: 1px solid #0f0; color: #0f0; padding: 12px 24px; cursor: pointer; font-family: monospace; }
        .post-card { background: #0c0c0c; border: 1px solid #222; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .post-header { display: flex; justify-content: space-between; border-bottom: 1px solid #222; padding-bottom: 10px; margin-bottom: 15px; }
        .post-author { display: flex; gap: 12px; align-items: center; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: #1a1a1a; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .author-name { color: #0f0; font-weight: bold; }
        .post-title { font-size: 24px; font-weight: bold; margin: 15px 0; }
        .post-text { color: #ccc; line-height: 1.5; margin: 15px 0; white-space: pre-wrap; }
        .delete-post { background: none; border: 1px solid #f33; color: #f66; padding: 5px 12px; cursor: pointer; }
        .comments-section { margin-top: 20px; border-top: 1px solid #222; padding-top: 15px; }
        .comment { background: #111; padding: 10px; margin: 10px 0; border-radius: 8px; }
        .add-comment { display: flex; gap: 10px; margin-top: 10px; }
        .comment-input { flex: 1; background: #1a1a1a; border: 1px solid #333; color: white; padding: 8px; }
        .comment-submit { background: #0a0a0a; border: 1px solid #0f0; color: #0f0; padding: 6px 12px; cursor: pointer; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #0a0a0a; border: 1px solid #0f0; padding: 30px; width: 90%; max-width: 600px; border-radius: 12px; }
        .modal-content input, .modal-content textarea { width: 100%; background: #111; border: 1px solid #333; color: white; padding: 10px; margin: 10px 0; }
        .modal-content textarea { min-height: 200px; }
        .close, .close-profile, .close-info { float: right; font-size: 28px; cursor: pointer; color: #f00; }
        .user-list { max-height: 400px; overflow-y: auto; }
        .user-item { border-bottom: 1px solid #222; padding: 10px; }
        @media (max-width: 768px) { .main-container { flex-direction: column; } }
    </style>
</head>
<body>
<div class="top-bar">
    <div class="left-area">
        <input type="text" id="adminCode" class="admin-input" placeholder="RAZRABOTCHIK212">
        <button class="check-admin" id="checkAdminBtn">Стать админом</button>
        <button class="info-btn" id="infoBtn">📋 Инфо</button>
    </div>
    <button class="profile-btn" id="profileBtn">👤 Профиль</button>
</div>
<div class="main-container">
    <div class="posts-area">
        <div class="action-buttons">
            <button class="create-post-btn" id="createPostBtn">✏️ Создать пост</button>
            <button class="view-posts-btn" id="viewPostsBtn">📰 Смотреть посты</button>
        </div>
        <div id="postsContainer">Загрузка...</div>
    </div>
    <div class="sidebar">
        <h3>📌 Профиль</h3>
        <p>Ник: @<span id="sidebarNick">-</span></p>
        <p>Роль: <span id="sidebarRole">Пользователь</span></p>
    </div>
</div>

<div id="postModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h2>Создать пост</h2>
        <input type="text" id="postTitle" placeholder="Название (макс 100)" maxlength="100">
        <textarea id="postText" placeholder="Текст (макс 10000 символов)" maxlength="10000"></textarea>
        <button id="submitPost">Опубликовать</button>
    </div>
</div>

<div id="profileModal" class="modal">
    <div class="modal-content">
        <span class="close-profile">&times;</span>
        <h2>👤 Профиль</h2>
        <input type="text" id="nicknameInput" placeholder="@никнейм (англ/цифры/-, 1-20 символов)">
        <button id="saveProfile">Сохранить</button>
    </div>
</div>

<div id="infoModal" class="modal">
    <div class="modal-content">
        <span class="close-info">&times;</span>
        <h2>📋 Пользователи</h2>
        <div id="userListContainer"></div>
    </div>
</div>

<script>
    document.getElementById('checkAdminBtn').onclick = () => {
        const code = document.getElementById('adminCode').value;
        if(code === 'RAZRABOTCHIK212') {
            localStorage.setItem('nowosty1_user_nick', 'SWILL_ADMIN');
            location.reload();
        } else {
            alert('Неверный код');
        }
    };
</script>
</body>
</html>
